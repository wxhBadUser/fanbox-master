<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#FFFFFF">
  <title>FanBox · Agent Workspace</title>
  <link rel="stylesheet" href="/mobile/mobile.css">
</head>
<body>
  <!-- 配对卡（未配对时显示；配对成功后隐藏） -->
  <section id="pair-screen" class="pair-screen" hidden>
    <div class="pair-card card">
      <h1 class="pair-title">Mobile Console</h1>
      <p class="pair-sub">安全配对 · 仅局域网 · 一次一码</p>
      <label class="field-label">设备名</label>
      <input id="pair-device" class="field" type="text" placeholder="例如 My Phone" maxlength="60">
      <label class="field-label">配对码</label>
      <input id="pair-code" class="field" type="text" inputmode="numeric" pattern="[0-9]{6}" placeholder="6 位数字" maxlength="6">
      <button id="pair-btn" class="btn-primary" type="button">配对</button>
      <div id="pair-msg" class="msg" role="status"></div>
    </div>
    <p class="pair-foot">移动端通过 LAN + Token 安全访问 FanBox。Agent 命令直接执行，audit 写入本地日志。</p>
  </section>

  <!-- 主应用（配对成功后显示） -->
  <div id="app" class="app" hidden>
    <!-- =========================================================
         Sidebar  (Phase UI-A7 · Manus-like)
         ---------------------------------------------------------
         Desktop: 常驻
         Mobile : 默认隐藏，drawer 打开
         内容:   FanBox / New Chat / Session / File / Skill / Setting
         ========================================================= -->
    <aside class="app-sidebar" id="app-sidebar" aria-label="Sidebar">
      <div class="sidebar-head">
        <div class="sidebar-brand">
          <div class="sidebar-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2 L20 7 L20 17 L12 22 L4 17 L4 7 Z"/>
              <circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/>
            </svg>
          </div>
          <div class="sidebar-brand-text">FanBox</div>
        </div>
        <button id="sidebar-close" class="sidebar-close" type="button" aria-label="Close sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>

      <button class="sidebar-cta" id="sidebar-new-chat" type="button" title="Start a new chat">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="10" y1="3" x2="10" y2="17"/>
          <line x1="3" y1="10" x2="17" y2="10"/>
        </svg>
        <span>New Chat</span>
      </button>

      <nav class="sidebar-nav" aria-label="Workspace navigation">
        <button class="sidebar-item" data-go="home" type="button" title="Chat">
          <span class="sidebar-item-icon" data-i="home"></span>
          <span>Chat</span>
        </button>
        <button class="sidebar-item" data-go="files" type="button" title="Files">
          <span class="sidebar-item-icon" data-i="files"></span>
          <span>File</span>
        </button>
        <button class="sidebar-item" data-go="skills" type="button" title="Skills">
          <span class="sidebar-item-icon" data-i="skills"></span>
          <span>Skill</span>
        </button>
        <button class="sidebar-item" data-go="sessions" type="button" title="Sessions">
          <span class="sidebar-item-icon" data-i="sessions"></span>
          <span>Session</span>
        </button>
        <button class="sidebar-item" data-go="settings" type="button" title="Settings">
          <span class="sidebar-item-icon" data-i="settings"></span>
          <span>Setting</span>
        </button>
      </nav>

      <div class="sidebar-section">
        <div class="sidebar-h">
          <span>Recent Sessions</span>
        </div>
        <div id="sidebar-sessions" class="sidebar-sessions" role="list" aria-label="Recent sessions"></div>
      </div>

      <div class="sidebar-foot">
        <span class="sidebar-foot-meta">LAN · Token</span>
      </div>
    </aside>

    <!-- drawer 遮罩 (mobile) -->
    <div id="sidebar-scrim" class="sidebar-scrim" aria-hidden="true"></div>

    <!-- =========================================================
         Main column
         ---------------------------------------------------------
         Top bar:  menu / Agent dropdown / cwd / refresh
         Content :  Home (Manus-like) | Files | Skills | Sessions | Settings
         ========================================================= -->
    <div class="app-main-col">
      <header class="app-topbar">
        <button id="app-menu" class="app-menu-btn" type="button" aria-label="Toggle sidebar" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="agent-dropdown" id="agent-dropdown">
          <button id="agent-dropdown-trigger" class="agent-dropdown-trigger" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Current agent">
            <span class="agent-dropdown-icon" id="agent-dropdown-icon" aria-hidden="true"></span>
            <span class="agent-dropdown-label" id="agent-dropdown-label">Claude Code</span>
            <svg class="agent-dropdown-caret" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div id="agent-dropdown-menu" class="agent-dropdown-menu" role="menu" hidden></div>
        </div>

        <div class="app-topbar-spacer"></div>

        <div class="app-topbar-meta" aria-hidden="false">
          <span id="topbar-cwd" class="topbar-meta-item" title="Working folder">—</span>
          <button id="app-refresh" class="app-icon-btn" type="button" aria-label="Refresh" title="Refresh">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3.5-7.1"/><polyline points="21 4 21 9 16 9"/></svg>
          </button>
        </div>
      </header>

      <main class="app-main" id="app-main">
        <!-- =========================================================
             Home Tab · Manus-like Agent Chat Workspace
             ---------------------------------------------------------
             Phase UI-A7: 中间就是 Agent 对话框；无独立 Agent Tab。
             状态 1: hero + 大输入框 + chips
             状态 2: 内联消息流 + 底部固定输入框
             ========================================================= -->
        <section class="view is-active" data-view="home">
          <!-- hero / 欢迎态 -->
          <div class="home-hero" id="home-hero">
            <div class="home-hero-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2 L20 7 L20 17 L12 22 L4 17 L4 7 Z"/>
                <circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/>
              </svg>
            </div>
            <h1 id="home-hero-greet" class="home-hero-greet">Leave all to FanBox</h1>
            <p id="home-hero-sub" class="home-hero-sub">Your AI agent workspace</p>
          </div>

          <!-- 大输入框 (hero 状态) -->
          <div class="home-composer" id="home-composer">
            <textarea id="home-input" class="home-composer-input" rows="1" maxlength="4000"
              placeholder="Assign a task or ask anything..."></textarea>
            <div class="home-composer-foot">
              <div class="home-composer-meta">
                <button id="home-skill-button" class="home-composer-chip" type="button" title="Use a skill">
                  <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 2L4 13h6l-1 7 7-11h-6l1-7z"/></svg>
                  <span id="home-skill-button-label">Skill</span>
                </button>
                <span id="home-status-pill" class="home-status-pill" aria-live="polite"></span>
              </div>
              <button id="home-send" class="home-composer-send" type="button" aria-label="Send" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="12" y1="19" x2="12" y2="5"/>
                  <polyline points="5 12 12 5 19 12"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- task chips -->
          <div class="home-chips" id="home-task-chips" aria-label="Task suggestions"></div>

          <!-- ChatGPT-like 消息区 (发消息后显示) -->
          <div class="home-chat" id="home-chat" hidden>
            <div id="home-messages" class="home-messages" aria-live="polite"></div>
            <div class="home-composer home-composer-sticky" id="home-composer-sticky">
              <textarea id="home-input-sticky" class="home-composer-input" rows="1" maxlength="4000"
                placeholder="Assign a task or ask anything..."></textarea>
              <div class="home-composer-foot">
                <div class="home-composer-meta">
                  <button id="home-skill-button-sticky" class="home-composer-chip" type="button" title="Use a skill">
                    <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 2L4 13h6l-1 7 7-11h-6l1-7z"/></svg>
                    <span id="home-skill-button-sticky-label">Skill</span>
                  </button>
                  <span id="home-status-pill-sticky" class="home-status-pill" aria-live="polite"></span>
                </div>
                <button id="home-send-sticky" class="home-composer-send" type="button" aria-label="Send" disabled>
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- =========================================================
             Files Tab · Phone File Manager
             ========================================================= -->
        <section class="view" data-view="files" hidden>
          <header class="view-header">
            <button class="view-back" id="files-back" type="button" aria-label="Back">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <h2 class="view-title" id="files-title">Files</h2>
            <button class="view-icon-btn" id="files-refresh" type="button" aria-label="Refresh">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3.5-7.1"/><polyline points="21 4 21 9 16 9"/></svg>
            </button>
          </header>

          <div class="files-search">
            <svg class="files-search-icon" viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="9" r="6"/><line x1="17" y1="17" x2="13.5" y2="13.5"/></svg>
            <input id="files-q" class="files-search-input" type="search" placeholder="搜索文件名" maxlength="80" autocomplete="off">
          </div>

          <div class="files-cwd-bar">
            <div class="files-cwd-bar-text">
              <div class="files-cwd-bar-h">当前文件夹</div>
              <div id="files-cwd-label" class="files-cwd-bar-path">未选择</div>
            </div>
            <button id="files-open-agent" class="files-cwd-bar-cta" type="button" disabled>
              <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 2L4 13h6l-1 7 7-11h-6l1-7z"/></svg>
              <span>从当前文件夹与 AI 对话</span>
            </button>
          </div>

          <div class="files-list" id="files-list" role="list" aria-label="File list"></div>

          <div id="files-preview" class="files-preview" hidden>
            <header class="files-preview-head">
              <div class="files-preview-meta">
                <div id="files-preview-name" class="files-preview-name"></div>
                <div id="files-preview-sub" class="files-preview-sub"></div>
              </div>
              <button id="files-preview-close" class="view-icon-btn" type="button" aria-label="Close preview">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
              </button>
            </header>
            <div id="files-preview-body" class="files-preview-body"></div>
          </div>
        </section>

        <!-- =========================================================
             Skills Tab · Skill Library
             ========================================================= -->
        <section class="view" data-view="skills" hidden>
          <header class="view-header">
            <h2 class="view-title">Skills</h2>
          </header>
          <div class="skills-search">
            <svg class="files-search-icon" viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="9" r="6"/><line x1="17" y1="17" x2="13.5" y2="13.5"/></svg>
            <input id="skills-q" class="files-search-input" type="search" placeholder="搜索技能" maxlength="60" autocomplete="off">
          </div>
          <div class="skills-filter" role="tablist" aria-label="Filter">
            <button class="skills-filter-btn is-active" data-filter="all" type="button" role="tab" aria-selected="true">All</button>
            <button class="skills-filter-btn" data-filter="enabled" type="button" role="tab" aria-selected="false">Enabled</button>
            <button class="skills-filter-btn" data-filter="disabled" type="button" role="tab" aria-selected="false">Disabled</button>
          </div>
          <div id="skills-list" class="skills-list" role="list" aria-label="Skills"></div>
        </section>

        <!-- =========================================================
             Sessions Tab · 全量 sessions 列表
             ========================================================= -->
        <section class="view" data-view="sessions" hidden>
          <header class="view-header">
            <h2 class="view-title">Sessions</h2>
            <button class="view-icon-btn" id="sessions-refresh" type="button" aria-label="Refresh">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3.5-7.1"/><polyline points="21 4 21 9 16 9"/></svg>
            </button>
          </header>
          <div id="sessions-list" class="sessions-list" role="list" aria-label="All sessions"></div>
        </section>

        <!-- =========================================================
             Settings Tab · 占位
             ========================================================= -->
        <section class="view" data-view="settings" hidden>
          <header class="view-header">
            <h2 class="view-title">Settings</h2>
          </header>
          <div class="settings-card">
            <p class="settings-card-h">Settings</p>
            <p class="settings-card-p">Mobile settings will be available in a future update.</p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/mobile/mobile.js" defer></script>
</body>
</html>
