<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>FanBox — Archive Banner v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Noto+Serif+SC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1880px; height: 800px; margin: 0; overflow: hidden; }
  body {
    position: relative;
    background: #F4EDE0;
    font-family: "Newsreader", "Noto Serif SC", Georgia, serif;
    color: #2A241E;
  }

  /* very subtle paper warmth, no busy texture */
  .vignette {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 100% at 25% 35%, rgba(255,255,255,0.40) 0%, transparent 60%),
      radial-gradient(130% 120% at 100% 110%, rgba(160,120,70,0.08) 0%, transparent 55%);
    pointer-events: none;
  }

  .stage { position: absolute; inset: 0; display: flex; align-items: center; }

  /* ============ LEFT ============ */
  .left {
    width: 980px;
    flex: none;
    padding-left: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    position: relative;
    z-index: 3;
  }
  .brand { display: flex; align-items: baseline; gap: 16px; }
  .wordmark { font-weight: 600; font-size: 36px; letter-spacing: 0.5px; color: #2A241E; }
  .wordmark .b { color: #C04A1A; }
  .wordmark-cn {
    font-family: "Noto Serif SC", serif; font-weight: 500;
    font-size: 18px; color: #9A8B76; letter-spacing: 4px;
  }

  .headline {
    margin-top: 40px;
    font-family: "Noto Serif SC", "Newsreader", serif;
    font-weight: 700;
    font-size: 104px;
    line-height: 1.05;
    letter-spacing: -1px;
    color: #2A241E;
  }
  .headline .vibe { color: #C04A1A; white-space: nowrap; }

  .blurb {
    margin-top: 36px;
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 27px;
    color: #6B5E4C;
    letter-spacing: 1px;
  }

  .url {
    margin-top: 64px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 18px;
    color: #8A7C68;
    letter-spacing: 0.5px;
  }
  .url .dot { color: #C04A1A; }

  /* ============ RIGHT: a small, calm stack of files ============ */
  .right { flex: 1; position: relative; height: 100%; z-index: 2; }

  .cards {
    position: absolute;
    top: 50%; left: 40px;
    transform: translateY(-50%);
    width: 540px;
  }
  .card {
    position: relative;
    background: #FBF6EC;
    border: 1px solid #E2D6C0;
    border-radius: 8px;
    height: 116px;
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 0 30px;
    box-shadow: 0 12px 26px -18px rgba(90,65,35,0.4);
  }
  .card + .card { margin-top: 26px; }
  .card.offset { margin-left: 64px; }

  .ftype {
    flex: none;
    width: 60px; height: 60px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: "IBM Plex Mono", monospace;
    font-weight: 500; font-size: 15px; letter-spacing: 0.5px;
    color: #FBF6EC;
  }
  .t-md   { background: #5B7A6B; }
  .t-py   { background: #3E6B8C; }
  .t-html { background: #B5642A; }

  .fname {
    font-family: "IBM Plex Mono", monospace;
    font-size: 25px; font-weight: 500;
    color: #2A241E; letter-spacing: 0.2px;
  }

  /* ---- the one lit card: agent is writing it ---- */
  .card.lit {
    background: #FBEFE2;
    border-color: #C04A1A;
    box-shadow: 0 0 0 1px #C04A1A, 0 18px 34px -18px rgba(192,74,26,0.55);
  }
  .card.lit .fname { color: #8C3411; }
  .caret {
    display: inline-block;
    width: 3px; height: 26px;
    background: #C04A1A;
    margin-left: 4px;
    transform: translateY(5px);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .stamp {
    position: absolute;
    top: -14px; right: -10px;
    transform: rotate(7deg);
    border: 1.5px solid #C04A1A;
    color: #C04A1A;
    background: #FBF1E7;
    border-radius: 5px;
    padding: 6px 13px;
    font-family: "Noto Serif SC", serif;
    font-weight: 600; font-size: 14px; letter-spacing: 3px;
    box-shadow: 0 5px 14px -7px rgba(192,74,26,0.6);
  }
</style>
</head>
<body>
  <div class="vignette"></div>

  <div class="stage">
    <div class="left">
      <div class="brand">
        <span class="wordmark"><span class="b">Fan</span>Box</span>
        <span class="wordmark-cn">翻箱</span>
      </div>

      <h1 class="headline">看得见的<br><span class="vibe">vibe coding</span></h1>

      <p class="blurb">AI 干活的现场，看得见、管得住。</p>

      <div class="url">github.com/alchaincyf<span class="dot">/</span>fanbox</div>
    </div>

    <div class="right">
      <div class="cards">
        <div class="card">
          <span class="ftype t-md">MD</span>
          <span class="fname">README.md</span>
        </div>

        <div class="card lit offset">
          <span class="stamp">写入中</span>
          <span class="ftype t-py">PY</span>
          <span class="fname">app.py<span class="caret"></span></span>
        </div>

        <div class="card">
          <span class="ftype t-html">HTML</span>
          <span class="fname">index.html</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
